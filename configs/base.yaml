# ─────────────────────────────────────────────────────────
#  TinyOCT — Base Configuration
# ─────────────────────────────────────────────────────────

project:
  name: tinyoct
  seed: 42
  device: auto           # auto | cpu | cuda | mps

# ── Dataset ──────────────────────────────────────────────
data:
  root: ./data
  oct2017_path: ./data/oct2017
  octmnist_path: ./data/medmnist
  octid_path: ./data/OCTID
  image_size: 224
  num_workers: 16       # 128 CPU cores on pod
  pin_memory: true
  classes: [CNV, DME, DRUSEN, NORMAL]
  # Class weights (inverse frequency, OCT2017 approximate)
  class_weights: [0.56, 1.83, 2.39, 0.80]

# ── Model ─────────────────────────────────────────────────
model:
  backbone: mobilenetv3_small_100
  pretrained: true
  feature_dim: 576        # MobileNetV3-Small last feature channels (stage-6 conv_pw expansion)
  spatial_size: 7         # Feature map spatial size after backbone
  num_classes: 4
  # RLAP v3
  rlap:
    horizontal: true
    vertical: true
    orientation_bank: true
    focal_spot: false     # FocalSpotStream for DRUSEN (enable in R6/R9 ablations)
    angles: [0, 30, 45, 60, 90, 135]   # 6-direction bank
    kernel_size: 3
  # Prototype head
  prototype:
    enabled: true
    temperature: 0.07     # cosine similarity temperature
  # Laplacian preprocessing (multi-scale: fine 3×3 + coarse 5×5)
  laplacian:
    enabled: true
    alpha: 0.1            # fine-scale (3×3) residual blend — sharp layer boundaries
    alpha_coarse: 0.05    # coarse-scale (5×5) residual blend — diffuse DRUSEN deposits

# ── Training ──────────────────────────────────────────────
train:
  epochs: 10
  batch_size: 128       # tuned for RTX 4090 24 GB; safe with orient double-forward
  num_workers: 16       # 128 CPU cores available on pod
  optimizer: adamw
  lr: 1.5e-3            # sqrt-scaling: 1e-3 × sqrt(128/64) ≈ 1.41e-3
  weight_decay: 1.0e-4
  scheduler: cosine       # cosine | step | plateau
  warmup_epochs: 3      # 3 epochs warmup at 2× batch scale
  # Loss
  loss:
    ce_weight: 1.0
    supcon_weight: 0.1    # λ₁
    orient_weight: 0.05   # λ₂
    orient_angle_range: 5 # ±5° rotation for L_orient
    orient_temperature: 2.0
    focal_gamma: 2.0      # Focal Loss exponent; 0.0 = standard weighted CE
  # SupCon
  supcon:
    temperature: 0.07
    balanced_sampling: true   # enforce equal class counts in batch
    margin: 0.3           # inter-class margin; 0.0 = standard SupCon

# ── Evaluation ────────────────────────────────────────────
eval:
  batch_size: 128
  tta: false                    # test-time augmentation
  tta_transforms: [hflip, brightness]
  calibration: true             # temperature scaling post-hoc

# ── Checkpointing ─────────────────────────────────────────
checkpoint:
  dir: ./checkpoints
  save_every_epoch: true        # keep all for ablation visualization
  save_best: true
  monitor: drusen_f1
  mode: max

# ── Logging ───────────────────────────────────────────────
logging:
  use_wandb: true              # Weights & Biases enabled — key read from .env
  wandb_project: tinyoct
  log_every_n_steps: 20
  output_dir: ./outputs
