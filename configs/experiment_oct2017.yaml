# Primary experiment on OCT2017
# GPU-optimised for 41 GB VRAM (A100/A6000-class pod)
defaults:
  - base

data:
  dataset: oct2017

train:
  epochs: 30
  batch_size: 128        # 2× baseline; safe for RTX 4090 24 GB with orient double-forward
  num_workers: 16        # 128 CPU cores available — feed GPU aggressively
  lr: 1.5e-3             # sqrt-scaling: 1e-3 × sqrt(128/64) ≈ 1.41e-3, rounded
  warmup_epochs: 3       # moderate warmup for 2× batch scale

logging:
  use_wandb: true
  wandb_project: tinyoct
